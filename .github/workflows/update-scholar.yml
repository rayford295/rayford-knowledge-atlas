name: Update Google Scholar Snapshot

on:
  schedule:
    - cron: "17 9 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-scholar:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Refresh Google Scholar snapshot
        run: npm run scholar:update

      - name: Rebuild public graph data
        run: npm run build

      - name: Verify graph data
        run: |
          node - <<'NODE'
          const fs = require("fs");
          const text = fs.readFileSync("data.js", "utf8")
            .replace(/^window\.researchMapData = /, "")
            .replace(/;\s*$/, "");
          const data = JSON.parse(text);
          if (!data.nodes.length) {
            throw new Error("data.js has no graph nodes");
          }
          console.log(`Verified ${data.nodes.length} graph nodes`);
          NODE

      - name: Commit updated snapshot and graph
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update Scholar snapshot and graph data"
          file_pattern: raw/scholar/google-scholar.json data.js
